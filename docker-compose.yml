services:
  shelflife:
    image: ghcr.io/fauxvo/shelflife:latest
    build: .
    container_name: shelflife
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/shelflife.db
      # Seerr (primary — the successor to Overseerr and Jellyseerr)
      - SEERR_URL=${SEERR_URL:-}
      - SEERR_API_KEY=${SEERR_API_KEY:-}
      - NEXT_PUBLIC_SEERR_URL=${NEXT_PUBLIC_SEERR_URL:-}
      # Overseerr (legacy fallback)
      - OVERSEERR_URL=${OVERSEERR_URL:-}
      - OVERSEERR_API_KEY=${OVERSEERR_API_KEY:-}
      - NEXT_PUBLIC_OVERSEERR_URL=${NEXT_PUBLIC_OVERSEERR_URL:-}
      # Jellyseerr (legacy fallback)
      - JELLYSEERR_URL=${JELLYSEERR_URL:-}
      - JELLYSEERR_API_KEY=${JELLYSEERR_API_KEY:-}
      - NEXT_PUBLIC_JELLYSEERR_URL=${NEXT_PUBLIC_JELLYSEERR_URL:-}
      - TAUTULLI_URL=${TAUTULLI_URL}
      - TAUTULLI_API_KEY=${TAUTULLI_API_KEY}
      - SONARR_URL=${SONARR_URL:-}
      - SONARR_API_KEY=${SONARR_API_KEY:-}
      - RADARR_URL=${RADARR_URL:-}
      - RADARR_API_KEY=${RADARR_API_KEY:-}
      - PLEX_CLIENT_ID=${PLEX_CLIENT_ID:-shelflife}
      - SESSION_SECRET=${SESSION_SECRET}
      - ADMIN_PLEX_ID=${ADMIN_PLEX_ID:-}
    volumes:
      - shelflife-data:/app/data
    labels:
      - "net.unraid.docker.managed=dockerman"
      - "net.unraid.docker.webui=http://[IP]:[PORT:3000]/"
      - "net.unraid.docker.icon=https://raw.githubusercontent.com/fauxvo/shelflife/main/public/icon.png"

volumes:
  shelflife-data:
    driver: local
